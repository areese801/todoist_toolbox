name: Unsnooze Tasks

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  unsnooze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r todoist/requirements.txt

      - name: Run unsnooze recipe
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: python -m todoist unsnooze --execute
