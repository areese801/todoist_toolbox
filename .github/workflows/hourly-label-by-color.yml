# Hourly Label by Color
#
# Labels tasks in projects matching the configured color with the configured label.
# Color and label are read from todoist/config.json.
# Runs every hour so new tasks get labeled quickly.

name: Hourly Label by Color

on:
  schedule:
    - cron: "0 * * * *"   # Every hour on the hour

  workflow_dispatch:

jobs:
  label-by-color:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r todoist/requirements.txt

      - name: Label projects by color
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: python -m todoist label-by-color --execute
