# Daily Todoist Recipes
#
# Runs two maintenance recipes each morning to clean up overdue tasks:
#   1. complete-overdue-recurring    — closes overdue recurring tasks (interval <= 7 days)
#   2. reschedule-overdue-nonrecurring — bumps overdue one-off tasks to today
#
# Schedule: 5:00 AM Mountain Time (11:00 UTC).
#   During MDT (Mar–Nov) this fires at 4:00 AM local — close enough.
#
# The workflow_dispatch trigger lets you run this manually from the Actions tab
# for testing: Actions > Daily Todoist Recipes > Run workflow.

name: Daily Todoist Recipes

on:
  # Cron schedule — runs on GitHub's UTC clock.
  # Minute Hour Day Month DayOfWeek
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC = 5:00 AM MST / 4:00 AM MDT

  # Manual trigger — adds a "Run workflow" button in the Actions tab.
  workflow_dispatch:

jobs:
  run-recipes:
    runs-on: ubuntu-latest

    steps:
      # ----- Setup -----

      # Check out the repo so we have access to the code.
      - name: Check out repository
        uses: actions/checkout@v4

      # Install the Python version that matches our local dev environment.
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Install project dependencies (todoist-api-python, python-dotenv, etc.).
      - name: Install dependencies
        run: pip install -r todoist/requirements.txt

      # ----- Recipes -----

      # Recipe 1: Complete overdue recurring tasks.
      # --execute makes it actually close tasks (not just dry-run).
      # continue-on-error: true ensures recipe 2 still runs if this one fails.
      - name: Complete overdue recurring tasks
        id: recipe_recurring
        continue-on-error: true
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: python -m todoist complete-overdue-recurring --execute

      # Recipe 2: Reschedule overdue non-recurring tasks to today.
      - name: Reschedule overdue non-recurring tasks
        id: recipe_nonrecurring
        continue-on-error: true
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: python -m todoist reschedule-overdue-nonrecurring --execute

      # ----- Post-run -----

      # Fail the workflow if either recipe failed.
      # Without this, continue-on-error would silently swallow failures.
      - name: Check for recipe failures
        if: steps.recipe_recurring.outcome == 'failure' || steps.recipe_nonrecurring.outcome == 'failure'
        run: |
          echo "::error::One or more recipes failed."
          echo "  complete-overdue-recurring:       ${{ steps.recipe_recurring.outcome }}"
          echo "  reschedule-overdue-nonrecurring:   ${{ steps.recipe_nonrecurring.outcome }}"
          exit 1
